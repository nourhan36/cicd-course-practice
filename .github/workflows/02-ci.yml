name: 02 CI Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-report.txt
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Trivy Dockerfile Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: table
          output: trivy-dockerfile-report.txt
          exit-code: 1
          severity: CRITICAL

      - name: Upload Trivy Scan Artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: trivy-scan-artifact-python-${{ matrix.python-version }}
          path: |
            trivy-fs-report.txt
            trivy-dockerfile-report.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v