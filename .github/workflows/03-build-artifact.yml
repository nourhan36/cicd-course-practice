# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: 03 Build Artifact Workflow

on:
  # Students start this workflow manually from the Actions tab.
  workflow_dispatch:

env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image

jobs:
  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Get the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python so the workflow can run the tests first.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # Build only after the verification step passes.
        run: python -m unittest discover -s tests -v

      - name: Set image tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Build Docker image with docker build
        run: |
          docker build \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Save Docker image as artifact file
        run: docker save "${IMAGE_NAME}:${IMAGE_TAG}" -o "${IMAGE_TAR}"

      - name: Save image metadata
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${IMAGE_TAG}"
          printf 'IMAGE_TAG=%s\n' "${IMAGE_TAG}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"

      - name: Upload build artifact
        # Store the packaged output so a later workflow can use the exact same package.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.IMAGE_TAR }}
            ${{ env.IMAGE_METADATA }}
          retention-days: 7
